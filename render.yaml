services:
  - type: web
    name: elo-kitten
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elo-kitten-rooms
          property: connectionString
      - key: TIER_ADMIN_PASSWORD
        sync: false

databases:
  - name: elo-kitten-rooms
    plan: free
    databaseName: elo_kitten_rooms
    user: elo_kitten
