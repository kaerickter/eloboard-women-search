<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방송용 빙고판</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1b2430;
      --muted: #687386;
      --line: #d9dee8;
      --accent: #e85a73;
      --accent-2: #2f8f83;
      --gold: #e7b75f;
      --mint: #bfe7db;
      --peach: #ffe3d4;
      --cell: #ffffff;
      --cell-checked: #fff0f3;
      --shadow: 0 18px 40px rgba(24, 32, 46, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(420px, 1.15fr) minmax(360px, .85fr);
      min-height: calc(100vh - 59px);
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 249, 239, .9);
      border-bottom: 1px solid rgba(214, 183, 149, .46);
      backdrop-filter: blur(12px);
    }

    .site-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 18px;
      border: 1px solid rgba(214, 183, 149, .68);
      border-radius: 999px;
      color: #553344;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 8px 22px rgba(88, 61, 45, .08);
      text-decoration: none;
      font-weight: 900;
    }

    .site-tab.active {
      border-color: #d596a8;
      background: linear-gradient(135deg, #fff2f6, #e9fff6);
      color: #70384c;
    }

    .site-tab.search {
      color: #17201a;
    }

    .broadcast {
      position: relative;
      isolation: isolate;
      display: grid;
      place-items: center;
      padding: clamp(20px, 4vw, 56px);
      background:
        linear-gradient(115deg, rgba(255, 255, 255, .42) 0 1px, transparent 1px 68px),
        radial-gradient(circle at 18% 16%, rgba(255, 226, 210, .88), transparent 28%),
        radial-gradient(circle at 83% 18%, rgba(191, 231, 219, .74), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(232, 90, 115, .22), transparent 42%),
        linear-gradient(135deg, #fff9ef 0%, #f7e8d9 38%, #d6eee5 100%);
      overflow: hidden;
    }

    .broadcast::before {
      content: "";
      position: absolute;
      inset: 18px;
      z-index: -1;
      border: 1px solid rgba(255, 255, 255, .8);
      border-radius: 26px;
      box-shadow: inset 0 0 0 1px rgba(231, 183, 95, .16);
    }

    .broadcast::after {
      content: "";
      position: absolute;
      inset: auto 7% 5% 7%;
      height: 18%;
      z-index: -1;
      background:
        radial-gradient(ellipse at center, rgba(99, 79, 60, .17), transparent 66%);
      filter: blur(2px);
    }

    .stage {
      position: relative;
      width: min(92vh, 100%);
      max-width: 820px;
      padding: clamp(18px, 2.4vw, 32px);
      color: #302235;
      background: rgba(255, 255, 255, .56);
      border: 1px solid rgba(255, 255, 255, .86);
      border-radius: clamp(22px, 3vw, 34px);
      box-shadow:
        0 26px 70px rgba(88, 61, 45, .18),
        inset 0 1px 0 rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
    }

    .stage.has-bingo {
      background:
        linear-gradient(135deg, rgba(255, 245, 193, .74), rgba(221, 248, 232, .66));
      box-shadow:
        0 26px 70px rgba(113, 88, 35, .22),
        0 0 0 6px rgba(231, 183, 95, .18),
        inset 0 1px 0 rgba(255, 255, 255, .88);
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      top: 22px;
      width: clamp(44px, 7vw, 72px);
      height: clamp(13px, 1.8vw, 18px);
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent 0 20%, rgba(255, 255, 255, .65) 20% 28%, transparent 28% 48%, rgba(255, 255, 255, .65) 48% 56%, transparent 56%),
        linear-gradient(90deg, #f6b3c1, #e85a73);
      box-shadow: 0 8px 18px rgba(200, 78, 102, .22);
    }

    .stage::before {
      left: clamp(18px, 2.4vw, 30px);
      transform: rotate(-8deg);
    }

    .stage::after {
      right: clamp(18px, 2.4vw, 30px);
      transform: rotate(8deg);
    }

    .stage-title {
      width: fit-content;
      max-width: 86%;
      margin: 0 auto clamp(18px, 2vw, 26px);
      padding: clamp(8px, 1.2vw, 12px) clamp(24px, 3.8vw, 44px);
      border: 1px solid rgba(231, 183, 95, .46);
      border-radius: 999px;
      text-align: center;
      font-size: clamp(30px, 4.1vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .9), rgba(255, 247, 235, .82));
      color: #553344;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .8);
      box-shadow:
        0 13px 28px rgba(118, 76, 54, .12),
        inset 0 -2px 0 rgba(231, 183, 95, .18);
      overflow-wrap: anywhere;
    }

    .preview-board,
    .edit-board {
      display: grid;
      gap: clamp(8px, 1.2vw, 14px);
      aspect-ratio: 1;
    }

    .preview-board {
      padding: clamp(8px, 1.3vw, 14px);
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: clamp(18px, 2.4vw, 28px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .52), rgba(255, 255, 255, .22));
      box-shadow:
        0 18px 38px rgba(88, 61, 45, .13),
        inset 0 1px 0 rgba(255, 255, 255, .8);
    }

    .preview-board.has-bingo {
      background:
        linear-gradient(135deg, rgba(255, 244, 186, .72), rgba(211, 244, 228, .56));
      box-shadow:
        0 22px 44px rgba(150, 115, 42, .2),
        0 0 0 5px rgba(231, 183, 95, .24),
        inset 0 1px 0 rgba(255, 255, 255, .86);
    }

    .preview-cell,
    .edit-cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border: 2px solid transparent;
      border-radius: 8px;
      text-align: center;
      line-height: 1.08;
      letter-spacing: 0;
      overflow: hidden;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .preview-cell {
      padding: 7%;
      background:
        linear-gradient(180deg, #ffffff 0%, #fffaf4 100%);
      color: #33253a;
      font-size: clamp(19px, 4.2vw, 52px);
      font-weight: 900;
      cursor: pointer;
      border-color: rgba(255, 255, 255, .86);
      border-radius: clamp(12px, 1.6vw, 18px);
      box-shadow:
        0 10px 18px rgba(116, 83, 63, .13),
        inset 0 -7px 0 rgba(231, 183, 95, .12),
        inset 0 1px 0 rgba(255, 255, 255, .96);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .preview-cell:hover {
      transform: translateY(-2px);
    }

    .preview-cell.checked {
      background:
        linear-gradient(180deg, #eefbf3 0%, #d8f2e3 100%);
      color: #1e6248;
      border-color: #8ed5ae;
      box-shadow:
        0 10px 22px rgba(47, 143, 131, .18),
        inset 0 -7px 0 rgba(47, 143, 131, .12),
        inset 0 1px 0 rgba(255, 255, 255, .9);
    }

    .preview-cell.checked::after,
    .edit-cell.checked::after {
      display: none;
    }

    .preview-cell.bingo-line {
      background:
        linear-gradient(180deg, #fff2b8 0%, #ffd66e 100%);
      color: #5c3900;
      border-color: #f0bd3d;
      box-shadow:
        0 0 0 4px rgba(255, 246, 197, .98),
        0 0 0 8px rgba(231, 183, 95, .42),
        0 14px 30px rgba(231, 183, 95, .32),
        inset 0 -7px 0 rgba(231, 183, 95, .12),
        inset 0 1px 0 rgba(255, 255, 255, .94);
    }

    .editor {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
      padding: 28px;
      background: var(--panel);
      border-left: 1px solid var(--line);
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .section {
      display: grid;
      gap: 10px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .label {
      color: #2d3848;
      font-size: 13px;
      font-weight: 800;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 166px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef1f5;
    }

    .segmented button {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
    }

    .segmented button.active {
      color: var(--ink);
      background: #fff;
      box-shadow: 0 2px 8px rgba(20, 28, 40, .12);
    }

    .field {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .field:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(21, 111, 122, .16);
    }

    .number-field {
      width: 96px;
    }

    .button {
      min-height: 40px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    .button.primary {
      border-color: var(--accent-2);
      color: #fff;
      background: var(--accent-2);
    }

    .button.warn {
      border-color: #f0c2c8;
      color: #8e1725;
      background: #fff5f6;
    }

    .button:active {
      transform: translateY(1px);
    }

    .edit-board {
      width: min(100%, 520px);
      gap: 8px;
    }

    .edit-cell {
      background: #fafbfc;
      border-color: var(--line);
    }

    .edit-cell.checked {
      background: #eaf8ef;
      border-color: #9bd8b6;
      color: #1e6248;
    }

    .edit-cell.bingo-line {
      background: #fff2bf;
      border-color: #e7b75f;
      color: #6b4300;
    }

    .edit-cell input {
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 10%;
      border: 0;
      color: inherit;
      background: transparent;
      text-align: center;
      font-size: clamp(15px, 2.2vw, 22px);
      font-weight: 800;
      outline: none;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .bingo-message {
      min-height: 32px;
      margin-top: clamp(12px, 1.8vw, 20px);
      color: #7b4b17;
      text-align: center;
      font-size: clamp(18px, 2.25vw, 30px);
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .85);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .broadcast {
        min-height: 62vh;
      }

      .editor {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 560px) {
      .site-nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .broadcast,
      .editor {
        padding: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .number-field {
        flex: 1 1 92px;
      }

      .button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="페이지 이동">
    <a class="site-tab search" href="./index.html">전적검색</a>
    <a class="site-tab active" href="./bingo-board.html">빙고판 열기</a>
  </nav>
  <main class="app">
    <section class="broadcast" aria-label="방송 송출용 빙고판">
      <div class="stage" id="stage">
        <h2 class="stage-title" id="previewTitle">빙고</h2>
        <div class="preview-board" id="previewBoard"></div>
        <div class="bingo-message" id="bingoMessage"></div>
      </div>
    </section>

    <aside class="editor" aria-label="빙고판 수정">
      <div class="topbar">
        <div>
          <h1>빙고판 수정</h1>
          <p class="hint">오른쪽에서 수정하면 왼쪽 송출 화면에 바로 반영됩니다.</p>
        </div>
        <button class="button" id="openBroadcast" type="button" title="송출 화면만 새 창으로 열기">새 창</button>
      </div>

      <section class="section">
        <label class="label" for="titleInput">제목</label>
        <input class="field" id="titleInput" type="text" value="빙고" maxlength="28">
      </section>

      <section class="section">
        <div class="label">판 크기</div>
        <div class="segmented" role="group" aria-label="빙고판 크기 선택">
          <button type="button" class="active" data-size="4">4x4</button>
          <button type="button" data-size="5">5x5</button>
        </div>
      </section>

      <section class="section">
        <div class="label">랜덤 숫자 채우기</div>
        <div class="row">
          <input class="field number-field" id="rangeStart" type="number" value="1" aria-label="시작 숫자">
          <span>~</span>
          <input class="field number-field" id="rangeEnd" type="number" value="30" aria-label="끝 숫자">
          <button class="button primary" id="randomFill" type="button">랜덤 채우기</button>
        </div>
        <div class="status" id="status">예: 1 ~ 30 입력 후 랜덤 채우기</div>
      </section>

      <section class="section">
        <div class="label">직접 수정</div>
        <div class="edit-board" id="editBoard"></div>
        <div class="row">
          <button class="button" id="clearMarks" type="button">체크 지우기</button>
          <button class="button warn" id="clearAll" type="button">전체 비우기</button>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const state = {
      size: 4,
      title: "빙고",
      cells: Array.from({ length: 25 }, () => ""),
      checked: Array.from({ length: 25 }, () => false)
    };

    const previewTitle = document.getElementById("previewTitle");
    const previewBoard = document.getElementById("previewBoard");
    const editBoard = document.getElementById("editBoard");
    const stage = document.getElementById("stage");
    const titleInput = document.getElementById("titleInput");
    const rangeStart = document.getElementById("rangeStart");
    const rangeEnd = document.getElementById("rangeEnd");
    const status = document.getElementById("status");
    const bingoMessage = document.getElementById("bingoMessage");
    const sizeButtons = document.querySelectorAll("[data-size]");
    const channel = "BroadcastChannel" in window ? new BroadcastChannel("broadcast-bingo") : null;
    let syncing = false;

    const saved = localStorage.getItem("broadcast-bingo-state");
    if (saved) {
      try {
        Object.assign(state, JSON.parse(saved));
      } catch {
        localStorage.removeItem("broadcast-bingo-state");
      }
    }

    function activeCount() {
      return state.size * state.size;
    }

    function save() {
      localStorage.setItem("broadcast-bingo-state", JSON.stringify(state));
      if (!syncing && channel) {
        channel.postMessage({ type: "state", state });
      }
    }

    function shuffle(values) {
      const copy = [...values];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getBingoLineIndexes() {
      const lines = [];
      const size = state.size;

      for (let row = 0; row < size; row += 1) {
        lines.push(Array.from({ length: size }, (_, col) => row * size + col));
      }

      for (let col = 0; col < size; col += 1) {
        lines.push(Array.from({ length: size }, (_, row) => row * size + col));
      }

      lines.push(Array.from({ length: size }, (_, i) => i * size + i));
      lines.push(Array.from({ length: size }, (_, i) => i * size + (size - 1 - i)));

      return lines.filter(line => line.every(index => state.checked[index]));
    }

    function fitText(element) {
      const text = element.textContent.trim();
      const length = text.length;
      element.style.fontSize = "";
      element.style.lineHeight = "";

      if (!length) return;

      if (length > 14) {
        element.style.fontSize = "clamp(12px, 1.7vw, 22px)";
      } else if (length > 8) {
        element.style.fontSize = "clamp(13px, 2vw, 26px)";
      } else if (length > 4) {
        element.style.fontSize = "clamp(15px, 1.9vw, 24px)";
      }

      let current = Number.parseFloat(getComputedStyle(element).fontSize);
      while ((element.scrollWidth > element.clientWidth || element.scrollHeight > element.clientHeight) && current > 12) {
        current -= 1;
        element.style.fontSize = `${current}px`;
        element.style.lineHeight = "1.12";
      }
    }

    function fitInput(input) {
      const length = input.value.trim().length;
      input.style.fontSize = "";
      if (length > 12) {
        input.style.fontSize = "13px";
      } else if (length > 6) {
        input.style.fontSize = "15px";
      } else if (length > 3) {
        input.style.fontSize = "17px";
      }
    }

    function render() {
      const count = activeCount();
      const bingoLines = getBingoLineIndexes();
      const highlighted = new Set(bingoLines.flat());
      const grid = `repeat(${state.size}, minmax(0, 1fr))`;

      previewTitle.textContent = state.title || "빙고";
      titleInput.value = state.title;
      previewBoard.style.gridTemplateColumns = grid;
      editBoard.style.gridTemplateColumns = grid;
      previewBoard.classList.toggle("has-bingo", bingoLines.length > 0);
      stage.classList.toggle("has-bingo", bingoLines.length > 0);
      previewBoard.innerHTML = "";
      editBoard.innerHTML = "";

      for (let i = 0; i < count; i += 1) {
        const previewCell = document.createElement("button");
        previewCell.type = "button";
        previewCell.className = "preview-cell";
        previewCell.textContent = state.cells[i] || "";
        previewCell.setAttribute("aria-label", `${i + 1}번 칸`);
        previewCell.addEventListener("click", () => toggleCheck(i));
        if (state.checked[i]) previewCell.classList.add("checked");
        if (highlighted.has(i)) previewCell.classList.add("bingo-line");
        previewBoard.appendChild(previewCell);
        fitText(previewCell);

        const editCell = document.createElement("div");
        editCell.className = "edit-cell";
        if (state.checked[i]) editCell.classList.add("checked");
        if (highlighted.has(i)) editCell.classList.add("bingo-line");

        const input = document.createElement("input");
        input.value = state.cells[i] || "";
        input.maxLength = 34;
        input.setAttribute("aria-label", `${i + 1}번 칸 내용`);
        input.addEventListener("input", event => {
          state.cells[i] = event.target.value;
          fitInput(event.target);
          save();
          renderPreviewOnly();
        });
        input.addEventListener("dblclick", () => toggleCheck(i));
        editCell.appendChild(input);
        editBoard.appendChild(editCell);
        fitInput(input);
      }

      sizeButtons.forEach(button => {
        button.classList.toggle("active", Number(button.dataset.size) === state.size);
      });

      bingoMessage.textContent = bingoLines.length ? `${bingoLines.length} BINGO!` : "";
      save();
    }

    if (channel) {
      channel.addEventListener("message", event => {
        if (event.data?.type !== "state") return;
        syncing = true;
        Object.assign(state, event.data.state);
        render();
        syncing = false;
      });
    }

    function renderPreviewOnly() {
      const cells = previewBoard.querySelectorAll(".preview-cell");
      cells.forEach((cell, index) => {
        cell.textContent = state.cells[index] || "";
        fitText(cell);
      });
      save();
    }

    function toggleCheck(index) {
      state.checked[index] = !state.checked[index];
      render();
    }

    function setSize(size) {
      state.size = size;
      state.checked = state.checked.map((checked, index) => index < activeCount() && checked);
      render();
    }

    function randomFill() {
      const start = Number(rangeStart.value);
      const end = Number(rangeEnd.value);
      const count = activeCount();
      const low = Math.min(start, end);
      const high = Math.max(start, end);
      const poolSize = high - low + 1;

      if (!Number.isInteger(start) || !Number.isInteger(end)) {
        status.textContent = "시작과 끝 숫자를 정확히 입력해 주세요.";
        return;
      }

      if (poolSize < count) {
        status.textContent = `${state.size}x${state.size}에는 숫자 ${count}개가 필요합니다. 범위를 더 넓혀 주세요.`;
        return;
      }

      const pool = Array.from({ length: poolSize }, (_, index) => String(low + index));
      shuffle(pool).slice(0, count).forEach((value, index) => {
        state.cells[index] = value;
        state.checked[index] = false;
      });

      status.textContent = `${low} ~ ${high} 중 ${count}개를 랜덤으로 넣었습니다.`;
      render();
    }

    function openBroadcastWindow() {
      const popup = window.open("", "bingoBroadcast", "width=1100,height=900");
      if (!popup) {
        status.textContent = "팝업이 차단되었습니다. 브라우저의 팝업 허용을 확인해 주세요.";
        return;
      }

      const html = `<!doctype html>${document.documentElement.outerHTML}`;
      popup.document.open();
      popup.document.write(html);
      popup.document.close();
      popup.document.body.classList.add("broadcast-only");

      const style = popup.document.createElement("style");
      style.textContent = `
        .site-nav { display: none; }
        .app { display: block; min-height: 100vh; }
        .editor { display: none; }
        .broadcast { min-height: 100vh; }
        .stage { width: min(92vh, 92vw); }
      `;
      popup.document.head.appendChild(style);
    }

    titleInput.addEventListener("input", event => {
      state.title = event.target.value;
      previewTitle.textContent = state.title || "빙고";
      save();
    });

    sizeButtons.forEach(button => {
      button.addEventListener("click", () => setSize(Number(button.dataset.size)));
    });

    document.getElementById("randomFill").addEventListener("click", randomFill);
    document.getElementById("clearMarks").addEventListener("click", () => {
      state.checked = state.checked.map(() => false);
      render();
    });
    document.getElementById("clearAll").addEventListener("click", () => {
      state.cells = state.cells.map(() => "");
      state.checked = state.checked.map(() => false);
      status.textContent = "빙고판을 비웠습니다.";
      render();
    });
    document.getElementById("openBroadcast").addEventListener("click", openBroadcastWindow);

    render();
  </script>
</body>
</html>
