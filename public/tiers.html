<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17213a">
    <title>여성 선수 티어표 · ELO Kitten</title>
    <link rel="stylesheet" href="./common-theme.css">
    <link rel="stylesheet" href="./tiers.css">
  </head>
  <body>
    <nav class="site-nav" aria-label="페이지 이동">
      <a class="site-tab active" href="./tiers.html" aria-current="page">티어표</a>
      <a class="site-tab" href="./index.html">전적검색</a>
      <a class="site-tab matchup" href="./matchup.html">상대전적</a>
      <a class="site-tab university" href="./university-matchup.html">대학대결</a>
      <a class="site-tab bingo" href="./bingo-board.html">빙고판 열기</a>
      <a class="site-tab" href="./kill-bet.html">킬 내기</a>
      <a class="site-tab" href="./scoreboard.html">매치 점수판</a>
      <a class="site-tab roulette" href="./lucky-roulette.html">행운 돌림판</a>
    </nav>

    <main class="tier-shell">
      <header class="tier-hero">
        <div>
          <p class="eyebrow">ELOBOARD · WOMEN ROSTER</p>
          <h1>여성 선수 티어표</h1>
          <p class="tier-intro">티어별로 선수를 모아보고, 방송 중인 카드는 바로 확인할 수 있습니다.</p>
        </div>
        <div class="live-toolbar" aria-live="polite">
          <span class="live-key"><i aria-hidden="true"></i> 현재 방송 중</span>
          <button id="refreshButton" class="refresh-button" type="button">LIVE 새로고침</button>
          <span id="refreshCountdown" class="countdown">페이지를 열 때 갱신</span>
        </div>
      </header>

      <section id="tierBoard" class="tier-board" aria-label="티어별 선수 목록">
        <div class="loading-card">
          <span class="loading-dot" aria-hidden="true"></span>
          최신 티어 명단을 불러오고 있습니다.
        </div>
      </section>

      <p id="boardStatus" class="board-status" role="status"></p>
      <p class="source-note">대학 소속 및 FA 선수를 모두 포함하며, LIVE 정보는 페이지를 열거나 직접 새로고침할 때 갱신됩니다.</p>
    </main>
    <script src="./tiers.js"></script>
  </body>
</html>
